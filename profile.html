<!DOCTYPE html>
<head>
    <style>
    
        .container{
            text-align:center;
            margin:80px;
          background-color:rgb(216,191,216);

          border-radius:80px;
        }
        .image{
             border-radius:80px;
            width:80px;
            height:80px;
            border-color:rgb(143, 188, 143);
            border:solid;
          

        }
        .greeting{
            color:rgb(	46,139,87);
        }
        .enter, .password{
            height:25px;
           
        }
        .button{
            margin-top:20px;
            border-radius:20px;
            width:80px;
            
        }

        .button:hover{
            background-color:rgb(143, 188, 143);
            cursor:pointer;
            
        }
        .button:active{
            opacity:0.8;
        }
            

    </style>
    <body>
        <div class='container'>
            <img class="image" src="https://media.craiyon.com/2025-09-17/KRsZcVg2Sny6MbI_5CT9iA.webp" alt="sakura"
        >
        <h3 class="greeting"> Futaba</h3>

        <from>
            <input class='enter' type='text' placeholder='enter name'>   </from><br><br>
            <input class='password' type='text' placeholder='password'>   </from>
            <br>
            <button class='button'>sign up</button>
            
        </div>

        
    </body>
</head>
